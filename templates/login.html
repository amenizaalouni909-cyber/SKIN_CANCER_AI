<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Skin Cancer AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-wrapper">
  <div class="card card-narrow">

    <div class="text-center mb-4">
      <span class="logo-icon">🔬</span>
      <h1 class="gradient-title">Skin Cancer AI</h1>
      <p style="color:var(--muted);font-size:.9rem;">Système de détection par intelligence artificielle</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="login-form">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-2" id="btn-login">
        🔑 Se connecter
      </button>
    </form>

    <p class="mt-3 text-center" style="color:var(--muted);font-size:.8rem;">
      Accès réservé au personnel médical autorisé
    </p>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', function(){
    const btn = document.getElementById('btn-login');
    btn.textContent = '⏳ Vérification…';
    btn.disabled = true;
  });
</script>
</body>
</html>
